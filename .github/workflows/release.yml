name: Release

# Builds cross-platform binaries and attaches them to a GitHub Release.
# Trigger by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure the release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: romoto
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  bump-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: check
        env:
          TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set — skipping tap bump"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout romoto (for the generator script)
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v5

      - name: Checkout tap
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: ragamo/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Regenerate and commit formula
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p tap/Formula
          sh scripts/gen-formula.sh "${GITHUB_REF_NAME}" > tap/Formula/romoto.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/romoto.rb
          git diff --staged --quiet || git commit -m "romoto ${GITHUB_REF_NAME#v}"
          git push
